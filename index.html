<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        :root { --dark: #1a1a1a; --accent: #b39359; --bg: #fdfbf7; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--dark); overflow-x: hidden; }
        
        /* Background Dinamis dari Sheet */
        .bg-custom { background-attachment: fixed; background-position: center; background-size: cover; }
        
        /* Hero/Cover */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; position: relative; }
        .hero::before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); }
        .hero-content { position: relative; z-index: 2; padding: 20px; }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 10vw, 5rem); font-style: italic; font-weight: 300; }
        
        /* Info Tamu */
        .guest-box { margin-top: 30px; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; backdrop-filter: blur(5px); }
        .btn-open { background: var(--accent); border: none; color: white; padding: 12px 30px; cursor: pointer; letter-spacing: 2px; font-size: 0.7rem; margin-top: 20px; text-transform: uppercase; }

        section { padding: 100px 20px; text-align: center; max-width: 1000px; margin: 0 auto; }
        .title { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--accent); margin-bottom: 50px; }

        /* Countdown WITA */
        .countdown-sect { background: var(--dark); color: white; padding: 60px 20px; }
        .cd-wrapper { display: flex; justify-content: center; gap: 15px; }
        .cd-item { border: 1px solid var(--accent); padding: 15px; border-radius: 8px; min-width: 70px; }
        .cd-item span { display: block; font-size: 1.8rem; color: var(--accent); font-family: 'Cormorant Garamond'; }

        /* Story Auto-Hide Style */
        .story-item { display: flex; align-items: center; gap: 30px; margin-bottom: 50px; text-align: left; }
        .story-item:nth-child(even) { flex-direction: row-reverse; text-align: right; }
        .story-img { width: 40%; height: 250px; object-fit: cover; border-radius: 10px; border: 5px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .story-text { width: 60%; }

        /* Gift & QR */
        .gift-sect { background: #f9f4eb; border-radius: 20px; padding: 40px; border: 1px dashed var(--accent); }
        .qr-box { width: 200px; margin: 20px auto; background: white; padding: 10px; border-radius: 10px; }
        .qr-box img { width: 100%; }

        .music-btn { position: fixed; bottom: 30px; left: 30px; width: 45px; height: 45px; background: white; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: var(--accent); cursor: pointer; }

        @media (max-width: 768px) { .story-item, .story-item:nth-child(even) { flex-direction: column; text-align: center; } .story-img, .story-text { width: 100%; } }
    </style>
</head>
<body class="bg-custom" id="bodyBg">

    <div class="music-btn" onclick="toggleMusic()" id="mBtn">♪</div>
    <audio id="bgm" loop><source id="mSource" src=""></audio>

    <section class="hero" id="heroSec">
        <div class="hero-content" data-aos="fade-up">
            <p style="letter-spacing:5px;">THE WEDDING OF</p>
            <h1 id="h-names">Loading...</h1>
            <div class="guest-box">
                <p style="font-size: 0.8rem; opacity: 0.8;">Kepada Yth. Bapak/Ibu/Saudara/i:</p>
                <h2 id="guest-name" style="font-family: 'Playfair Display'; margin: 10px 0;">Tamu Undangan</h2>
            </div>
            <button class="btn-open" onclick="startInv()">Buka Undangan</button>
        </div>
    </section>

    <div id="main-content" style="display:none;">
        <section id="mempelai">
            <div class="title" data-aos="fade-up">Mempelai</div>
            <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:40px;">
                <div id="box-pria" data-aos="fade-right">
                    <img id="p-foto" src="" style="width:250px; height:350px; object-fit:cover; border-radius:125px 125px 0 0; border: 8px solid white;">
                    <h2 id="p-nama" class="title" style="font-size:1.8rem; margin:15px 0 5px;"></h2>
                    <p>Putra dari <br><b id="p-ortu"></b></p>
                </div>
                <div id="box-wanita" data-aos="fade-left">
                    <img id="w-foto" src="" style="width:250px; height:350px; object-fit:cover; border-radius:125px 125px 0 0; border: 8px solid white;">
                    <h2 id="w-nama" class="title" style="font-size:1.8rem; margin:15px 0 5px;"></h2>
                    <p>Putri dari <br><b id="w-ortu"></b></p>
                </div>
            </div>
        </section>

        <section class="countdown-sect">
            <h3 id="display-tgl" style="margin-bottom:20px; font-family:'Playfair Display'; font-weight:400;"></h3>
            <div class="cd-wrapper" id="timer-box">
                <div class="cd-item"><span id="days">00</span><label>Hari</label></div>
                <div class="cd-item"><span id="hours">00</span><label>Jam</label></div>
                <div class="cd-item"><span id="mins">00</span><label>Menit</label></div>
                <div class="cd-item"><span id="secs">00</span><label>Detik</label></div>
            </div>
        </section>

        <section id="sect-story" style="display:none;">
            <div class="title">Our Love Story</div>
            <div id="story-container"></div>
        </section>

        <section id="sect-event">
            <div class="title">Waktu & Lokasi</div>
            <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:20px;">
                <div id="box-akad" class="gift-sect" style="flex:1; min-width:300px;">
                    <h3>Akad Nikah</h3>
                    <p id="ak-tgl" style="margin:10px 0; font-weight:600;"></p>
                    <p id="ak-lok" style="font-size:0.85rem; margin-bottom:15px;"></p>
                    <a id="ak-map" href="#" target="_blank" class="btn-open" style="text-decoration:none;">Lihat Lokasi</a>
                </div>
                <div id="box-resepsi" class="gift-sect" style="flex:1; min-width:300px;">
                    <h3>Resepsi</h3>
                    <p id="re-tgl" style="margin:10px 0; font-weight:600;"></p>
                    <p id="re-lok" style="font-size:0.85rem; margin-bottom:15px;"></p>
                    <a id="re-map" href="#" target="_blank" class="btn-open" style="text-decoration:none;">Lihat Lokasi</a>
                </div>
            </div>
        </section>

        <section id="sect-gift" style="display:none;">
            <div class="title">Wedding Gift</div>
            <div class="gift-sect">
                <p>Kado Digital / Transfer:</p>
                <div id="bank-list" style="margin-top:20px;"></div>
                <div id="qr-box" class="qr-box" style="display:none;">
                    <img id="qr-img" src="" alt="QR Code">
                </div>
            </div>
        </section>

        <footer style="padding:50px; background:#111; color:white; font-size:0.6rem; letter-spacing:3px;">
            MADE BY OMAHAKSARA
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        const API = "https://script.google.com/macros/s/AKfycbxl_wwAkQSD9S5uNDfXhzT253KAtRTqeDNxZsB8TiU66KWLKsYdKVOgOJYsBBkNrmqxtw/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const u = urlParams.get('u');
        const to = urlParams.get('to');

        if(to) document.getElementById('guest-name').innerText = decodeURIComponent(to.replace(/\+/g, ' '));

        fetch(API).then(r => r.json()).then(res => {
            const d = res[u];
            if(!d) return;

            // Hero & Background
            document.getElementById('heroSec').style.backgroundImage = `url('${d.foto_sampul}')`;
            document.getElementById('bodyBg').style.backgroundImage = `url('${d.foto_bg_isi}')`;
            document.getElementById('h-names').innerText = d.pria_nama.split(' ')[0] + ' & ' + d.wanita_nama.split(' ')[0];
            
            // Mempelai
            document.getElementById('p-nama').innerText = d.pria_nama;
            document.getElementById('p-foto').src = d.pria_foto;
            document.getElementById('p-ortu').innerText = d.pria_ortu;
            document.getElementById('w-nama').innerText = d.wanita_nama;
            document.getElementById('w-foto').src = d.wanita_foto;
            document.getElementById('w-ortu').innerText = d.wanita_ortu;

            // Event
            document.getElementById('display-tgl').innerText = d.waktu_display;
            document.getElementById('ak-tgl').innerText = d.akad_tgl;
            document.getElementById('ak-lok').innerText = d.akad_lokasi;
            document.getElementById('ak-map').href = d.map_akad;
            document.getElementById('re-tgl').innerText = d.resepsi_tgl;
            document.getElementById('re-lok').innerText = d.resepsi_lokasi;
            document.getElementById('re-map').href = d.map_resepsi;

            // Logic Auto-Hide Story
            if(d.cerita_1_teks || d.cerita_2_teks) {
                document.getElementById('sect-story').style.display = 'block';
                let storyHTML = '';
                for(let i=1; i<=3; i++) {
                    if(d['cerita_'+i+'_teks']) {
                        storyHTML += `
                        <div class="story-item" data-aos="fade-up">
                            <img src="${d['foto_cerita_'+i]}" class="story-img">
                            <div class="story-text"><h3>Momen ${i}</h3><p>${d['cerita_'+i+'_teks']}</p></div>
                        </div>`;
                    }
                }
                document.getElementById('story-container').innerHTML = storyHTML;
            }

            // Logic Auto-Hide Gift & QR
            if(d.bank_data) {
                document.getElementById('sect-gift').style.display = 'block';
                document.getElementById('bank-list').innerHTML = `<h3 style="color:var(--accent)">${d.bank_data}</h3>`;
                // Jika kolom bank_data berisi link gambar, tampilkan QR
                if(d.bank_data.includes('http')) {
                    document.getElementById('qr-box').style.display = 'block';
                    document.getElementById('qr-img').src = d.bank_data;
                    document.getElementById('bank-list').innerHTML = '<p>Scan QR di bawah untuk transfer</p>';
                }
            }

            document.getElementById('mSource').src = d.musik_url;
            startCountdown(d.waktu_countdown);
            AOS.init({ duration: 1000, once: true });
        });

        function startCountdown(date) {
            // Target WITA (GMT+8)
            const target = new Date(date.replace(' ', 'T') + "+08:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;
                if(diff < 0) return;
                document.getElementById('days').innerText = Math.floor(diff/(1000*60*60*24));
                document.getElementById('hours').innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
                document.getElementById('mins').innerText = Math.floor((diff%(1000*60*60))/(1000*60));
                document.getElementById('secs').innerText = Math.floor((diff%(1000*60))/1000);
            }, 1000);
        }

        function startInv() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('mBtn').style.display = 'flex';
            document.getElementById('bgm').play();
            window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
        }

        function toggleMusic() {
            const a = document.getElementById('bgm');
            if(a.paused) { a.play(); document.getElementById('mBtn').innerText = '♪'; }
            else { a.pause(); document.getElementById('mBtn').innerText = '✖'; }
        }
    </script>
</body>
</html>

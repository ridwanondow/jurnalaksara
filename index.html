<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omahbuku — Perpus Rumahan & Ladang Curhat</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #1a1a1a;
            --accent: #d4a373;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container Mobile-First */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(180deg, #1a1412 0%, #0d0d0d 100%);
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Header */
        header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            color: var(--accent);
            text-shadow: 0 0 15px rgba(212, 163, 115, 0.3);
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* Chat Section */
        #chat-section {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chat-bubble {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.5s ease forwards;
        }

        .user-chat {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        .ai-chat {
            align-self: flex-end;
            background: linear-gradient(135deg, #d4a373 0%, #a67c52 100%);
            color: #1a1412;
            font-weight: 500;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 20px rgba(212, 163, 115, 0.2);
        }

        /* Input Area */
        .input-wrapper {
            position: fixed;
            bottom: 80px;
            width: 100%;
            max-width: 480px;
            padding: 15px 20px;
            background: transparent;
        }

        .input-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            backdrop-filter: blur(10px);
        }

        .input-box input {
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            flex: 1;
            outline: none;
            font-family: var(--font-sans);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Library Horizontal Scroll */
        .library-section {
            padding: 20px 0;
            margin-top: 10px;
        }

        .section-title {
            padding: 0 20px;
            font-family: var(--font-serif);
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--accent);
        }

        .book-slider {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 0 20px 20px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .book-slider::-webkit-scrollbar { display: none; }

        .book-card {
            flex: 0 0 140px;
            scroll-snap-align: start;
            transition: transform 0.3s ease;
        }

        .book-cover {
            width: 140px;
            height: 200px;
            background: #2a2a2a;
            border-radius: 12px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            font-family: var(--font-serif);
            font-size: 0.9rem;
        }

        .book-card p {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Navbar */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background: rgba(13, 13, 13, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        nav button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button.active { color: var(--accent); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading */
        .loader {
            display: none;
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            color: var(--accent);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">Omahbuku</div>
        <div class="tagline">Perpus Rumahan & Ladang Curhat</div>
    </header>

    <div id="chat-section">
        <div class="chat-bubble ai-chat">Selamat datang di Omahbuku. Ceritakan apa yang sedang menyesakkan harimu...</div>
    </div>
    <div class="loader" id="loader">Aksara sedang meresapi ceritamu...</div>

    <div class="library-section">
        <h3 class="section-title">Koleksi Buku</h3>
        <div class="book-slider" id="book-slider">
            </div>
    </div>

    <div class="input-wrapper">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Tuliskan keresahanmu..." onkeypress="handleKey(event)">
            <button class="send-btn" onclick="processChat()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <nav>
        <button class="active">🏠</button>
        <button onclick="alert('Fitur Library segera hadir full!')">📚</button>
        <button onclick="alert('Fitur Profile segera hadir!')">👤</button>
    </nav>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwG3WgnhuGViLobwetXVmn2mFoIXso3UXMBmhNv8346xp8gtt-Ox642ZZ4kvxEwn1CZ/exec';
    let database = null;

    // Fetch Data on Load
    async function initApp() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            database = data;
            renderLibrary(data.library);
        } catch (e) {
            console.error("Gagal load data", e);
        }
    }

    function renderLibrary(books) {
        const slider = document.getElementById('book-slider');
        slider.innerHTML = books.map(book => `
            <div class="book-card" onclick="window.open('${book.link}', '_blank')">
                <div class="book-cover">${book.title}</div>
                <p>${book.title}</p>
            </div>
        `).join('');
    }

    function handleKey(e) {
        if (e.key === 'Enter') processChat();
    }

    function processChat() {
        const input = document.getElementById('user-input');
        const chatSection = document.getElementById('chat-section');
        const text = input.value.trim().toLowerCase();

        if (!text || !database) return;

        // Add User Bubble
        chatSection.innerHTML += `<div class="chat-bubble user-chat">${input.value}</div>`;
        input.value = '';
        window.scrollTo(0, document.body.scrollHeight);

        document.getElementById('loader').style.display = 'block';

        // Logic Pencocokan Keyword
        setTimeout(() => {
            let found = database.engine.find(item => 
                item.keywords.split(', ').some(key => text.includes(key))
            );

            let reply = "";
            if (found) {
                // Ambil reply_1 secara default, atau random dari reply 1-3
                const replies = [found.reply_1, found.reply_2, found.reply_3].filter(r => r !== "");
                reply = replies[Math.floor(Math.random() * replies.length)];
            } else {
                reply = "Aku mendengarmu. Terkadang tidak semua hal punya jawaban instan, tapi kamu tidak sendiri di sini.";
            }

            document.getElementById('loader').style.display = 'none';
            chatSection.innerHTML += `<div class="chat-bubble ai-chat">${reply}</div>`;
            window.scrollTo(0, document.body.scrollHeight);
        }, 1000);
    }

    initApp();
</script>

</body>
</html>

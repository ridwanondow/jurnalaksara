<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Omah Aksara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        :root { --dark: #0a0a0a; --gold: #d4af37; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: var(--white); overflow-x: hidden; line-height: 1.6; }
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; background-size: cover; background-position: center; position: relative; text-align: center; }
        .hero::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
        .hero-content { position: relative; z-index: 10; padding: 20px; }
        section { padding: 60px 20px; max-width: 800px; margin: 0 auto; text-align: center; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .profile-img { width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .btn-gold { background: var(--gold); color: var(--dark); padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; display: inline-block; }
        #content { display: none; }
        #loading { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading">Menyiapkan Undangan...</div>

<audio id="audio" loop><source id="mSource" src=""></audio>

<section class="hero" id="hero-bg">
    <div class="hero-content">
        <h1 id="nama-utama" style="font-family: 'Playfair Display'; font-size: 3rem;"></h1>
        <div class="card">
            <p>Yth. <br><span id="guest-to" style="font-weight: bold; font-size: 1.2rem;"></span></p>
            <br>
            <button class="btn-gold" onclick="openInv()">BUKA UNDANGAN</button>
        </div>
    </div>
</section>

<div id="content">
    <section>
        <h2 style="font-family: 'Playfair Display'; color: var(--gold);">Mempelai</h2>
        <br>
        <div data-aos="fade-up">
            <img id="p-foto" class="profile-img">
            <h3 id="p-nama"></h3>
            <p id="p-ortu" style="font-size: 0.8rem; opacity: 0.7;"></p>
        </div>
        <div style="font-size: 2rem; margin: 20px 0;">&</div>
        <div data-aos="fade-up">
            <img id="w-foto" class="profile-img">
            <h3 id="w-nama"></h3>
            <p id="w-ortu" style="font-size: 0.8rem; opacity: 0.7;"></p>
        </div>
    </section>

    <section id="story-list"></section>

    <section>
        <div class="card">
            <h3 style="color: var(--gold);">Kado Digital</h3>
            <p id="bank-info"></p>
        </div>
    </section>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzZNjJdSiqL373KT5Xlj_vPoq9wBlMNX-ys2YYN833yVdCRsuDCKmqMWnNGONz338UpHQ/exec";
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('u') || 'zeya-putra';
    const to = params.get('to') || 'Tamu Undangan';

    document.getElementById('guest-to').innerText = to;

    fetch(SCRIPT_URL)
    .then(res => res.json())
    .then(data => {
        const d = data.config[slug];
        if(!d) return;

        document.getElementById('hero-bg').style.backgroundImage = `url('${d.foto_sampul}')`;
        document.getElementById('nama-utama').innerText = d.pria_nama.split(' ')[0] + " & " + d.wanita_nama.split(' ')[0];
        document.getElementById('p-foto').src = d.pria_foto;
        document.getElementById('p-nama').innerText = d.pria_nama;
        document.getElementById('p-ortu').innerText = d.pria_ortu;
        document.getElementById('w-foto').src = d.wanita_foto;
        document.getElementById('w-nama').innerText = d.wanita_nama;
        document.getElementById('w-ortu').innerText = d.wanita_ortu;
        document.getElementById('bank-info').innerText = d.bank_data;
        document.getElementById('mSource').src = d.musik_url;
        document.getElementById('audio').load();

        let sHtml = "";
        for(let i=1; i<=3; i++) {
            if(d[`cerita_${i}_teks`]) {
                sHtml += `<div class="card" data-aos="fade-up">
                            <img src="${d[`foto_cerita_${i}`]}" style="width:100%; border-radius:10px;">
                            <p style="margin-top:15px;">${d[`cerita_${i}_teks`]}</p>
                          </div>`;
            }
        }
        document.getElementById('story-list').innerHTML = sHtml;

        document.getElementById('loading').style.display = 'none';
        AOS.init();
    });

    function openInv() {
        document.getElementById('content').style.display = 'block';
        document.getElementById('audio').play();
        window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
